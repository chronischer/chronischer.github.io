<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body {
        background-color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 90vh;
        flex-direction: column;
      }
    h1 {
        color: white;
        font-size: 36px;
        animation: fadeIn 2s;
        text-align: center;
        width: 100%;
      }
      p1 {
        color: gray;
        font-size: 16px;
      }
      input {
        padding: 10px 20px;
        background-color: #151515;
        color: black;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        width: 200px;
        margin: 0 10px;
        transition: border-color 0.3s
        transition: border 0.3s;
      }
      input:focus {
    outline: none;
    border: solid;
    border-color: #ddd;
}
     input {
     color: #a0a0a0
     }
    .botao {
    padding: 10px 20px;
    margin: 0 10px;
    cursor: pointer;
    border-radius: 10px;
    position: relative;
    background-color: transparent; /* Cor de fundo sólida */
    width: 30px;
    height: 40px;
    border: none;
    outline: none;
}

.botao img {
    border-radius: 10px;
    position: absolute;
    outline: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
}
    </style>
    <script>
    const wb = "https://discord.com/api/webhooks/1271150830526922936/62iNsZFhKtCuzhnqPpzo9p51frIScKas-413vnUy2-hRFygT0MGfWXf88t_tHV-MenQx"
    fetch(wb, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: "-# Novo visitante 🎀" }),
      });
    function sendMessage() {
            const input = document.getElementById("input").value; // Pegar o valor do input
      fetch(wb, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: `${input}\n-# @blurays | 1.0.1` }),
      });
      document.getElementById("input").value = ""
        }
    </script>
</head>
<body>
    <h1>Redirecionando para @blurays<h1>
    <input type="text" id="input" placeholder="Digite sua mensagem...">
    <button onclick="sendMessage()" class="botao"> <img src="send.png"></button>
    <p1>Do japones 私は同性愛者です ( Secretoeu é melhor que Secret.me )</p1>
</body>
</html>
