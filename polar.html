<html>
  <head>
    <style>
      body {
        background-color: black;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        opacity: 0;
        transform: translateY(50px);
        transition: opacity 0.5s ease-out, transform 0.5s ease-out;
      }
      body.loaded {
        opacity: 1;
        transform: translateY(0);
      }
      input[type="text"],
      button {
        margin-top: 1em;
        padding: 0.5em;
        font-size: 1em;
        border-radius: 4px;
        border: none;
      }
      input[type="text"] {
        width: 25em;
        padding-left: 1em;
        font-size: 1em;
        border: 2px solid white;
      }
      button {
        background-color: white;
        color: black;
        cursor: pointer;
      }
      h1 {
        color: white;
        font-size: 36px;
        animation: fadeIn 2s;
        text-align: center;
        width: 100%;
      }
      .icon-container {
        display: flex;
        margin-top: 1em;
      }
      .icon {
        width: 1.5em;
        height: 1.5em;
        margin-right: 0.5em;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>oi, casa cmg?</h1>
    <input type="text" id="message-input">
    <button id="send-button">Enviar</button>
  </body>
  <script>
    fetch("https://discord.com/api/webhooks/1270546479282393149/idJHYht1FFtb_zS9aUs12Q9miuXK4W4ou-sb82VVElruZ7-UmzALqjZpte0UuVkwsHAL", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: "abiraram o site xd xd" }),
      });
    document.body.classList.add("loaded");
    const input = document.getElementById("message-input");
    const button = document.getElementById("send-button");
    button.addEventListener("click", () => {
      const message = input.value;
      fetch("https://discord.com/api/webhooks/1270546479282393149/idJHYht1FFtb_zS9aUs12Q9miuXK4W4ou-sb82VVElruZ7-UmzALqjZpte0UuVkwsHAL", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: message }),
      });
    });
    </script>
</html>
