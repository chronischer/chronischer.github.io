<!DOCTYPE html>
<html>
<head>
    <title>Criptografador/Descriptografador</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <textarea id="texto" placeholder="Digite seu texto aqui"></textarea>
    <button onclick="criptografar()">Criptografar</button>
    <button onclick="descriptografar()">Descriptografar</button>
    <textarea id="resultado" readonly></textarea>

    <script>
        const tabelaSubstituicao = {
    "A": "!",
    "B": "(",
    "C": "7",
    "D": "]",
    "E": "q",
    "F": "K",
    "G": "}",
    "H": "m",
    "I": ":",
    "J": "z",
    "K": "*",
    "L": "a",
    "M": "W",
    "N": "2",
    "O": "9",
    "P": "=",
    "Q": "b",
    "R": "5",
    "S": "X",
    "T": "i",
    "U": "U",
    "V": "o",
    "W": "!",
    "X": "p",
    "Y": "c",
    "Z": "@"
            };

        function criptografar() {
            const texto = document.getElementById('texto').value;
            let resultado = '';
            for (let i = 0; i < texto.length; i++) {
                const char = texto[i].toUpperCase();
                resultado += tabelaSubstituicao[char] || char;
            }
            document.getElementById('resultado').value = resultado;
        }

        function descriptografar() {
            const texto = document.getElementById('texto').value;
            let resultado = '';
            for (let i = 0; i < texto.length; i++) {
                const char = texto[i];
                for (const chave in tabelaSubstituicao) {
                    if (tabelaSubstituicao[chave] === char) {
                        resultado += chave;
                        break;
                    }
                }
                if (!resultado[i]) resultado += char;
            }
            document.getElementById('resultado').value = resultado;
        }
    </script>
</body>
</html>
